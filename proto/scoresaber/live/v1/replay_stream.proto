syntax = "proto3";

package scoresaber.live.v1;

option csharp_namespace = "ScoreSaber.Live.V1";
option go_package = "github.com/ScoreSaber/platform/apps/ludus/src/generated/proto/scoresaber/live/v1;livev1";

message ReplayStreamPacket {
  string stream_id = 1;
  string connection_id = 2;
  string player_id = 3;
  string match_id = 4;

  oneof body {
    ReplayStreamStart start = 10;
    ReplayChunk chunk = 11;
    ReplayCheckpoint checkpoint = 12;
    ReplayStreamEnd end = 13;
    ReplayStreamFailure failure = 14;
    ReplayResumeRequest resume_request = 15;
    ReplayResumeResponse resume_response = 16;
    ReplayAck ack = 17;
  }
}

message ReplayStreamStart {
  uint32 protocol_version = 1;
  PlayerIdentity player = 2;
  BeatmapIdentity beatmap = 3;
  ReplayPayloadFormat payload_format = 4;
  uint32 payload_format_version = 5;
  ReplayCompression payload_compression = 6;
  uint32 recommended_chunk_size_bytes = 7;
  uint32 max_chunk_size_bytes = 8;
  int64 client_start_time_unix_ms = 9;
  int64 server_start_time_unix_ms = 10;
  string game_session_id = 11;
  repeated ReplayFeature features = 12;
  StreamReplayMetadata replay_metadata = 13;
  repeated ReplayExtension replay_extensions = 14;
}

message PlayerIdentity {
  string player_id = 1;
  ReplayPlatform platform = 2;
  string game_version = 3;
  string client_version = 4;
  string replay_mod_version = 5;
}

message BeatmapIdentity {
  string map_hash = 1;
  string level_id = 2;
  int32 difficulty = 3;
  string difficulty_name = 4;
  string characteristic = 5;
  string leaderboard_id = 6;
  repeated string modifiers = 7;
  uint32 max_score = 8;
}

message ReplayCursor {
  uint64 sequence = 1;
  int64 song_time_ms = 2;
  int64 server_time_unix_ms = 3;
  int64 client_time_unix_ms = 4;
}

message ReplayChunk {
  ReplayCursor cursor = 1;
  StreamReplayEventBatch events = 2;
  ReplayEventCounts cumulative_event_counts = 3;
  repeated ReplayExtension replay_extensions = 4;
}

message ReplayCheckpoint {
  ReplayCursor cursor = 1;
  ReplayCheckpointKind kind = 2;
  StreamReplaySnapshot snapshot = 3;
  uint64 last_contiguous_sequence = 4;
}

message ReplayStreamEnd {
  ReplayCursor cursor = 1;
  ReplayCompletion completion = 2;
  ReplayScoreSummary score = 3;
  uint64 chunk_count = 5;
  ReplayEventCounts cumulative_event_counts = 6;
  bytes stream_sha256 = 7;
  repeated ReplayExtension replay_extensions = 8;
}

message ReplayStreamFailure {
  ReplayCursor last_committed_cursor = 1;
  ReplayFailureReason reason = 2;
  ReplayStreamState state = 3;
  string message = 4;
  bool can_resume = 5;
  uint32 resume_window_seconds = 6;
}

message ReplayResumeRequest {
  uint64 last_received_sequence = 1;
  string previous_connection_id = 2;
  bytes last_packet_sha256 = 3;
}

message ReplayResumeResponse {
  ReplayResumeStatus status = 1;
  uint64 next_sequence = 2;
  uint64 highest_buffered_sequence = 3;
  bool checkpoint_required = 4;
  string message = 5;
}

message ReplayAck {
  uint64 highest_contiguous_sequence = 1;
  repeated uint64 missing_sequences = 2;
}

message StreamReplayMetadata {
  string replay_version = 1;
  string level_id = 2;
  int32 difficulty = 3;
  string characteristic = 4;
  string environment = 5;
  repeated string modifiers = 6;
  float note_spawn_offset = 7;
  bool left_handed = 8;
  float initial_height = 9;
  float room_rotation = 10;
  ReplayVector3 room_center = 11;
  float fail_time_seconds = 12;
  string game_version = 13;
  string plugin_version = 14;
  string platform = 15;
  float song_speed = 16;
  float jump_distance = 17;
  ReplayColor left_saber_color = 18;
  ReplayColor right_saber_color = 19;
}

message StreamReplayEventBatch {
  repeated ReplayPoseFrame pose_frames = 1;
  repeated ReplayHeightEvent height_events = 2;
  repeated ReplayNoteEvent note_events = 3;
  repeated ReplayScoreEvent score_events = 4;
  repeated ReplayComboEvent combo_events = 5;
  repeated ReplayMultiplierEvent multiplier_events = 6;
  repeated ReplayEnergyEvent energy_events = 7;
  float min_time_seconds = 8;
  float max_time_seconds = 9;
  repeated ReplayPauseEvent pause_events = 10;
}

message StreamReplaySnapshot {
  StreamReplayMetadata replay_metadata = 1;
  ReplayPoseFrame latest_pose = 2;
  ReplayHeightEvent latest_height = 3;
  ReplayScoreEvent latest_score = 4;
  ReplayComboEvent latest_combo = 5;
  ReplayMultiplierEvent latest_multiplier = 6;
  ReplayEnergyEvent latest_energy = 7;
  ReplayEventCounts cumulative_event_counts = 8;
  repeated ReplayExtension replay_extensions = 9;
}

message ReplayExtension {
  string id = 1;
  uint32 version = 2;
  bytes payload = 3;
}

message ReplayEventCounts {
  uint64 pose_frames = 1;
  uint64 height_events = 2;
  uint64 note_events = 3;
  uint64 score_events = 4;
  uint64 combo_events = 5;
  uint64 multiplier_events = 6;
  uint64 energy_events = 7;
  uint64 pause_events = 8;
}

message ReplayPoseFrame {
  ReplayPose head = 1;
  ReplayPose left = 2;
  ReplayPose right = 3;
  int32 fps = 4;
  float time_seconds = 5;
}

message ReplayPose {
  ReplayVector3 position = 1;
  ReplayQuaternion rotation = 2;
}

message ReplayVector3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message ReplayQuaternion {
  float x = 1;
  float y = 2;
  float z = 3;
  float w = 4;
}

message ReplayColor {
  float r = 1;
  float g = 2;
  float b = 3;
  float a = 4;
}

message ReplayHeightEvent {
  float height = 1;
  float time_seconds = 2;
}

message ReplayScoreEvent {
  int32 score = 1;
  float time_seconds = 2;
  optional int32 immediate_max_possible_score = 3;
}

message ReplayComboEvent {
  int32 combo = 1;
  float time_seconds = 2;
}

message ReplayMultiplierEvent {
  int32 multiplier = 1;
  float next_multiplier_progress = 2;
  float time_seconds = 3;
}

message ReplayEnergyEvent {
  float energy = 1;
  float time_seconds = 2;
}

message ReplayPauseEvent {
  bool paused = 1;
  float time_seconds = 2;
  int64 client_time_unix_ms = 3;
}

message ReplayNoteEvent {
  ReplayNoteId note_id = 1;
  ReplayNoteEventType event_type = 2;
  ReplayVector3 cut_point = 3;
  ReplayVector3 cut_normal = 4;
  ReplayVector3 saber_direction = 5;
  int32 saber_type = 6;
  bool direction_ok = 7;
  float saber_speed = 8;
  float cut_angle = 9;
  float cut_distance_to_center = 10;
  float cut_direction_deviation = 11;
  float before_cut_rating = 12;
  float after_cut_rating = 13;
  float time_seconds = 14;
  float unity_timescale = 15;
  float time_sync_timescale = 16;
  optional float time_deviation = 17;
  ReplayQuaternion world_rotation = 18;
  ReplayQuaternion inverse_world_rotation = 19;
  ReplayQuaternion note_rotation = 20;
  ReplayVector3 note_position = 21;
}

message ReplayNoteId {
  float time_seconds = 1;
  int32 line_layer = 2;
  int32 line_index = 3;
  int32 color_type = 4;
  int32 cut_direction = 5;
  optional int32 gameplay_type = 6;
  optional int32 scoring_type = 7;
  optional float cut_direction_angle_offset = 8;
}

message ReplayScoreSummary {
  uint32 score = 1;
  uint32 modified_score = 2;
  uint32 max_score = 3;
  double accuracy = 4;
  uint32 combo = 5;
  uint32 max_combo = 6;
  bool full_combo = 7;
  uint32 good_cuts = 8;
  uint32 bad_cuts = 9;
  uint32 missed_notes = 10;
  uint32 bomb_hits = 11;
  uint32 wall_hits = 12;
}

enum ReplayPayloadFormat {
  REPLAY_PAYLOAD_FORMAT_UNSPECIFIED = 0;
  REPLAY_PAYLOAD_FORMAT_SCORESABER_STREAM_V1 = 1;
}

enum ReplayCompression {
  REPLAY_COMPRESSION_UNSPECIFIED = 0;
  REPLAY_COMPRESSION_NONE = 1;
  REPLAY_COMPRESSION_ZSTD = 2;
  REPLAY_COMPRESSION_LZ4 = 3;
}

enum ReplayFeature {
  REPLAY_FEATURE_UNSPECIFIED = 0;
  REPLAY_FEATURE_CHECKPOINTS = 1;
  REPLAY_FEATURE_RESUME = 2;
  REPLAY_FEATURE_SPECTATOR_CATCHUP = 3;
}

enum ReplayPlatform {
  REPLAY_PLATFORM_UNSPECIFIED = 0;
  REPLAY_PLATFORM_STEAM = 1;
  REPLAY_PLATFORM_OCULUS_PC = 2;
  REPLAY_PLATFORM_META_QUEST = 3;
  REPLAY_PLATFORM_DEV = 4;
}

enum ReplayCheckpointKind {
  REPLAY_CHECKPOINT_KIND_UNSPECIFIED = 0;
  REPLAY_CHECKPOINT_KIND_KEYFRAME = 1;
  REPLAY_CHECKPOINT_KIND_STATE_SNAPSHOT = 2;
  REPLAY_CHECKPOINT_KIND_SERVER_WATERMARK = 3;
}

enum ReplayNoteEventType {
  REPLAY_NOTE_EVENT_TYPE_UNSPECIFIED = 0;
  REPLAY_NOTE_EVENT_TYPE_GOOD_CUT = 1;
  REPLAY_NOTE_EVENT_TYPE_BAD_CUT = 2;
  REPLAY_NOTE_EVENT_TYPE_MISS = 3;
  REPLAY_NOTE_EVENT_TYPE_BOMB = 4;
}

enum ReplayCompletion {
  REPLAY_COMPLETION_UNSPECIFIED = 0;
  REPLAY_COMPLETION_PASSED = 1;
  REPLAY_COMPLETION_FAILED = 2;
  REPLAY_COMPLETION_QUIT = 3;
  REPLAY_COMPLETION_ABORTED = 4;
}

enum ReplayStreamState {
  REPLAY_STREAM_STATE_UNSPECIFIED = 0;
  REPLAY_STREAM_STATE_STARTING = 1;
  REPLAY_STREAM_STATE_STREAMING = 2;
  REPLAY_STREAM_STATE_DISCONNECTED = 3;
  REPLAY_STREAM_STATE_RESUMING = 4;
  REPLAY_STREAM_STATE_ENDED = 5;
  REPLAY_STREAM_STATE_FAILED = 6;
}

enum ReplayFailureReason {
  REPLAY_FAILURE_REASON_UNSPECIFIED = 0;
  REPLAY_FAILURE_REASON_CLIENT_DISCONNECTED = 1;
  REPLAY_FAILURE_REASON_SERVER_DISCONNECTED = 2;
  REPLAY_FAILURE_REASON_AUTH_EXPIRED = 3;
  REPLAY_FAILURE_REASON_OUT_OF_ORDER = 4;
  REPLAY_FAILURE_REASON_DUPLICATE_SEQUENCE = 5;
  REPLAY_FAILURE_REASON_MISSING_SEQUENCE = 6;
  REPLAY_FAILURE_REASON_PAYLOAD_TOO_LARGE = 7;
  REPLAY_FAILURE_REASON_STREAM_EXPIRED = 8;
  REPLAY_FAILURE_REASON_VALIDATION_FAILED = 9;
  REPLAY_FAILURE_REASON_STREAM_FINALIZATION_FAILED = 10;
  REPLAY_FAILURE_REASON_INTERNAL_ERROR = 11;
}

enum ReplayResumeStatus {
  REPLAY_RESUME_STATUS_UNSPECIFIED = 0;
  REPLAY_RESUME_STATUS_ACCEPTED = 1;
  REPLAY_RESUME_STATUS_NEED_CHECKPOINT = 2;
  REPLAY_RESUME_STATUS_TOO_OLD = 3;
  REPLAY_RESUME_STATUS_STREAM_CLOSED = 4;
  REPLAY_RESUME_STATUS_REJECTED = 5;
}
